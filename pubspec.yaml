name: ezze_score_card
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 👇 Added the launcher icons package here
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 👇 Activated your assets folder so the app can see your icon and splash.gif
  assets:
    - assets/logo.png
    - assets/splash.gif

# 👇 Added the configuration block for the launcher icons
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"